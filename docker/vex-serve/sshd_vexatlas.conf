# Dedicated sshd instance for Vex Atlas (vex-serve), containerized variant.
# See architur/docs/deploy-vex-serve.md for the full design rationale — this
# file matches deploy/vex-serve/sshd_vexatlas.conf, adapted to run as PID 1
# in a container (no separate admin sshd on the same host to avoid clashing
# with; the container's only process is this one).

Port 22
AddressFamily any
ListenAddress 0.0.0.0

HostKey /etc/ssh/vexatlas/ssh_host_ed25519_key

PubkeyAuthentication yes
PasswordAuthentication no
KbdInteractiveAuthentication no
PermitRootLogin no
PermitEmptyPasswords no
AllowAgentForwarding no
AllowTcpForwarding no
X11Forwarding no
PermitTunnel no
AllowUsers vex

AuthorizedKeysCommand /usr/local/bin/vex-authorized-keys %f
AuthorizedKeysCommandUser vexkeys
AuthorizedKeysFile none

Subsystem sftp /bin/false
PrintMotd no
PrintLastLog no
Banner none
LoginGraceTime 20
MaxAuthTries 3
MaxSessions 50
ClientAliveInterval 30
ClientAliveCountMax 4
