name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-x86_64
            exe: .exe
          - runner: macos-latest   # arm64 (Apple Silicon, macos-14)
            target: aarch64-apple-darwin
            artifact_suffix: macos-arm64
            exe: ""
          # Cross-compile macOS Intel from the Apple Silicon runner. The
          # macos-latest image ships the x86_64 SDK, and the macos-13 (Intel)
          # runner pool is being deprecated by GitHub — jobs scheduled on it
          # routinely sit queued for hours and were the reason every v0.1.0
          # release was stuck. fail-fast:false + needs:build means one stuck
          # job blocks the entire release, so we keep everything on the
          # current runner image.
          - runner: macos-latest
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64
            exe: ""
          - runner: ubuntu-latest  # vex-serve server deployment target
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64
            exe: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # ── vex CLI (no cloud features — smallest binary for end users) ──────
      - name: Build vex
        run: cargo build --release -p vex-cli --target ${{ matrix.target }}

      # ── vex-serve (cloud features — Linux server only) ───────────────────
      # vex-serve runs on Linux. Skip the build on Windows/macOS client targets
      # to avoid pulling in the AWS SDK on platforms where it won't be deployed.
      #
      # After deploying vex-serve to the host, set these env vars (in
      # /etc/planmorph/vex.env — owned root:vex 0640):
      #   VEX_API_BASE            https://api.planmorph.software
      #   VEX_INTERNAL_HMAC_SECRET  must match Vex__InternalSecret in the API
      #   VEX_REPO_ROOT           /var/lib/planmorph-vex
      #   VEX_FAIL_CLOSED         1   (deny SSH if the API is unreachable)
      - name: Build vex-serve
        if: matrix.artifact_suffix == 'linux-x86_64'
        run: >
          cargo build --release -p vex-serve
          --features 'vex-storage/s3-backend vex-storage/postgres-backend'
          --target ${{ matrix.target }}

      # ── Package ──────────────────────────────────────────────────────────
      # We publish TWO things per platform for vex-cli:
      #
      #   1. vex-{tag}-{suffix}.tar.gz
      #      The "scripted" bundle: contains a sub-folder with the binary,
      #      vex-serve (linux only) and a SHA256SUMS file. Consumed by
      #      install.sh / install.ps1, and by the deploy-vex-serve job below.
      #
      #   2. A single-file artifact for the "Direct downloads" buttons on the
      #      website. Tar.gz is a terrible browser-download format on macOS
      #      (Safari half-extracts it into a folder users mistake for the
      #      source repo) and Windows (PowerShell can't unpack it natively).
      #
      #         macOS  →  vex-{tag}-{suffix}.zip   (single binary at root)
      #         Windows → vex-{tag}-windows-x86_64.exe   (bare .exe)
      #
      #      Linux client builds are not exposed on the website — vex-serve
      #      ships through deploy-vex-serve below — so we skip the direct
      #      artifact for linux-x86_64.
      - name: Package artifacts
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          EXE="${{ matrix.exe }}"
          BIN="vex${EXE}"
          DIR="dist/vex-${VERSION}-${{ matrix.artifact_suffix }}"
          mkdir -p "$DIR" dist

          cp "target/${{ matrix.target }}/release/${BIN}" "$DIR/${BIN}"

          if [[ -f "target/${{ matrix.target }}/release/vex-serve" ]]; then
            cp "target/${{ matrix.target }}/release/vex-serve" "$DIR/vex-serve"
          fi

          # 1) Scripted bundle.
          ( cd "$DIR" \
            && sha256sum "${BIN}" >> SHA256SUMS \
            && { [[ -f vex-serve ]] && sha256sum vex-serve >> SHA256SUMS; } || true )

          ARCHIVE="dist/vex-${VERSION}-${{ matrix.artifact_suffix }}.tar.gz"
          tar -czf "$ARCHIVE" -C dist "vex-${VERSION}-${{ matrix.artifact_suffix }}"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

          # 2) Direct-download single-file artifact (client OSes only).
          case "${{ matrix.artifact_suffix }}" in
            windows-*)
              DIRECT="dist/vex-${VERSION}-${{ matrix.artifact_suffix }}.exe"
              cp "$DIR/${BIN}" "$DIRECT"
              echo "DIRECT=$DIRECT" >> "$GITHUB_ENV"
              ;;
            macos-*)
              DIRECT="dist/vex-${VERSION}-${{ matrix.artifact_suffix }}.zip"
              ( cd "$DIR" && zip -qj "../../${DIRECT}" "${BIN}" )
              echo "DIRECT=$DIRECT" >> "$GITHUB_ENV"
              ;;
            *) ;;  # linux-x86_64: no direct artifact
          esac

      - name: Upload artifact (scripted bundle)
        uses: actions/upload-artifact@v4
        with:
          name: vex-${{ matrix.artifact_suffix }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1

      - name: Upload artifact (direct download)
        if: env.DIRECT != ''
        uses: actions/upload-artifact@v4
        with:
          name: vex-${{ matrix.artifact_suffix }}-direct
          path: ${{ env.DIRECT }}
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.exe
            dist/**/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── Deploy vex-serve to the planmorph-prod droplet ────────────────────
  # Runs only after the GitHub release is published. Pulls the linux-x86_64
  # archive (which contains vex-serve), scp's the binary into /tmp on the
  # droplet, and uses pre-authorised sudo rules to install + restart it.
  #
  # Required secrets (configure in repo Settings → Secrets → Actions):
  #   DEPLOY_HOST    — droplet IP or hostname (e.g. 46.101.76.29)
  #   DEPLOY_USER    — unprivileged user (e.g. deploy)
  #   DEPLOY_SSH_KEY — ed25519 private key whose public half is in
  #                    /home/deploy/.ssh/authorized_keys on the droplet
  deploy-vex-serve:
    name: Deploy vex-serve to droplet
    needs: release
    runs-on: ubuntu-latest
    # Skip on prereleases (e.g. v0.1.0-rc1). Adjust if you want them deployed.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: vex-linux-x86_64
          path: dist/

      - name: Extract vex-serve binary
        run: |
          set -euo pipefail
          tar -xzf dist/vex-${GITHUB_REF_NAME}-linux-x86_64.tar.gz -C dist
          mv dist/vex-${GITHUB_REF_NAME}-linux-x86_64/vex-serve dist/vex-serve
          file dist/vex-serve
          sha256sum dist/vex-serve

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          # GitHub stores secrets without trailing newline; add one for OpenSSH.
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload + install + restart
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes"
          SCP="scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes"

          $SCP dist/vex-serve "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/vex-serve.new"
          $SSH "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'sudo /usr/bin/install -m 755 -o root -g root /tmp/vex-serve.new /usr/local/bin/vex-serve \
              && sudo /bin/systemctl restart vex-serve \
              && sudo /bin/systemctl is-active vex-serve \
              && rm -f /tmp/vex-serve.new'

          echo "vex-serve ${GITHUB_REF_NAME} deployed to ${DEPLOY_HOST}."
