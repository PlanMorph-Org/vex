name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest  # Windows x86_64
          - macos-latest    # macOS arm64 (Apple Silicon) — also validates the
                            # macOS toolchain we cross-compile x86_64 from in
                            # release.yml. macos-13 (Intel) was deprecated by
                            # GitHub and was leaving CI runs queued forever.
          - ubuntu-latest   # Linux x86_64 (needed for vex-serve server builds)

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test -q

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (cloud features)
        run: >
          cargo clippy
          -p vex-storage --features s3-backend,postgres-backend
          -p vex-serve
          -- -D warnings

  deny:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  corpus:
    name: Fidelity corpus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Cache corpus fixtures
        uses: actions/cache@v4
        with:
          path: crates/vex-core/tests/fixtures/corpus
          key: ifc-corpus-cecf656112a54a0d8cdd8b06b9398bfea5163886-v1

      - name: Fetch corpus (pinned, checksummed)
        run: tools/fetch-fixtures.sh

      - name: Run fidelity battery
        run: cargo test -p vex-core --test fidelity

      - name: Scale smoke test
        run: VEX_SCALE_STOREYS=10 cargo test -p vex-core --test fidelity -- --ignored scale_import_commit_diff
