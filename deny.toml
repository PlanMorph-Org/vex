# cargo-deny configuration.
# Runs in CI: `cargo deny check`.

[graph]
all-features = true

[licenses]
version = 2
# Allowlist only permissive + weak-copyleft licenses. LGPL is explicitly excluded
# so IfcOpenShell (LGPL-3.0) can only be reached via process boundaries.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"

[advisories]
version = 2
yanked = "deny"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
