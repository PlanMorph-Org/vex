# cargo-deny configuration.
# Runs in CI: `cargo deny check`.

[graph]
all-features = true

[licenses]
version = 2
# Allowlist only permissive + weak-copyleft licenses. LGPL is explicitly excluded
# so IfcOpenShell (LGPL-3.0) can only be reached via process boundaries.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    # webpki-roots ships Mozilla's CA bundle under this license.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93
# Skip license checks for crates in this workspace — they use a proprietary
# license file that cargo-deny cannot classify via SPDX heuristics.
private.ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"

[advisories]
version = 2
yanked = "deny"
ignore = [
    # bincode 1.3.3 is unmaintained but the team considers it complete.
    # No safe upgrade is available; the crate is frozen, not broken.
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.3.3 is considered complete by its authors; no security impact" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
